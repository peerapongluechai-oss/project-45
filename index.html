<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project 45: Flexible Fit & Firm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #FDFBF7; }
        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        @keyframes float-avatar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
        }
        .animate-float-avatar { animation: float-avatar 3s ease-in-out infinite; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        // ---------------------------------------------------------
        // 🔥 ตั้งค่า Firebase Database (กุญแจของลูกพี่ myfamilyproject)
        // ---------------------------------------------------------
        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                return JSON.parse(__firebase_config);
            }
            return {
                apiKey: "AIzaSyAmQFwL7zniKTnT2INt93iHOlCuT97hC7g",
                authDomain: "myfamilyproject-ecff4.firebaseapp.com",
                projectId: "myfamilyproject-ecff4",
                storageBucket: "myfamilyproject-ecff4.firebasestorage.app",
                messagingSenderId: "714527535272",
                appId: "1:714527535272:web:fefa9679e822d31e52529d"
                // ลบ measurementId ออกเพื่อลดระยะเวลาโหลด
            };
        };

        const app = initializeApp(getFirebaseConfig());
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'project45_github_app';

        // --- Component ย่อย (Avatars & Confetti) ---
        const Confetti = () => {
            return (
                <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                {Array.from({ length: 50 }).map((_, i) => {
                    const colors = ['#a855f7', '#d946ef', '#ec4899', '#8b5cf6', '#eab308', '#f472b6'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    const isCircle = Math.random() > 0.5;
                    return (
                    <div key={i} className="absolute top-[-10%]"
                        style={{
                        left: `${Math.random() * 100}%`,
                        width: `${Math.random() * 10 + 5}px`, height: `${Math.random() * 10 + 5}px`,
                        backgroundColor: randomColor, borderRadius: isCircle ? '50%' : '4px',
                        animation: `confetti-fall ${Math.random() * 2.5 + 1.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`,
                        animationDelay: `${Math.random() * 0.5}s`,
                        }}
                    />
                    );
                })}
                </div>
            );
        };

        const TransformationAvatar = ({ weight, targetWeight, initialWeight }) => {
            const progress = Math.max(0, Math.min(1, (initialWeight - weight) / (initialWeight - targetWeight)));
            const bodyRx = 30 - (16 * progress);
            const faceY = 26;

            return (
                <div className="relative w-24 h-24 flex items-center justify-center mx-2 group">
                    <div className="absolute -top-3 whitespace-nowrap bg-white/95 px-2.5 py-0.5 rounded-full text-[10px] font-black text-purple-600 shadow-sm border border-purple-100 z-10 transition-all duration-500">
                        {progress >= 1 ? 'หุ่นปังแล้ว! 🎉' : progress > 0.5 ? 'ครึ่งทางแล้ว! ✨' : 'สู้ๆ นะคะ! 💕'}
                    </div>

                    <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md transition-transform duration-300">
                        <g className="animate-float-avatar">
                            <path d="M 36 26 C 20 40, 30 70, 40 75 C 50 78, 60 78, 60 75 C 70 70, 80 40, 64 26 Z" fill="#3f271d" />
                            <line x1="43" y1="65" x2="43" y2="85" stroke="#fcd5ce" strokeWidth="4.5" strokeLinecap="round" />
                            <line x1="57" y1="65" x2="57" y2="85" stroke="#fcd5ce" strokeWidth="4.5" strokeLinecap="round" />
                            <ellipse cx="41" cy="86" rx="5" ry="3.5" fill="#c084fc" />
                            <ellipse cx="59" cy="86" rx="5" ry="3.5" fill="#c084fc" />
                            <line x1="45" y1="42" x2={50 - bodyRx - 3} y2="58" stroke="#fcd5ce" strokeWidth="4" strokeLinecap="round" className="transition-all duration-700 ease-out" />
                            <line x1="55" y1="42" x2={50 + bodyRx + 3} y2="58" stroke="#fcd5ce" strokeWidth="4" strokeLinecap="round" className="transition-all duration-700 ease-out" />
                            <path d={`M 41 38 L 59 38 L ${50 + bodyRx} 68 Q 50 72 ${50 - bodyRx} 68 Z`} fill="#a855f7" className="transition-all duration-700 ease-out" />
                            <path d={`M ${50 - bodyRx*0.65} 48 Q 50 51 ${50 + bodyRx*0.65} 48`} fill="none" stroke="#7e22ce" strokeWidth="2.5" strokeLinecap="round" className="transition-all duration-700 ease-out" />
                            <circle cx="50" cy={faceY} r="14" fill="#fcd5ce" />
                            <path d="M 35 25 Q 50 5 65 25 Q 50 15 35 25" fill="#3f271d" />
                            <path d="M 36 28 Q 40 18 52 18 Q 45 22 36 28" fill="#5c3a21" />
                            <path d="M 62 10 L 68 5 L 67 14 Z" fill="#e879f9" />
                            <path d="M 62 10 L 56 5 L 57 14 Z" fill="#e879f9" />
                            <circle cx="62" cy="10" r="2.5" fill="#d946ef" />
                            <circle cx="42" cy={faceY + 4} r="3" fill="#ffa6c9" opacity="0.8" />
                            <circle cx="58" cy={faceY + 4} r="3" fill="#ffa6c9" opacity="0.8" />
                            <circle cx="44" cy={faceY + 1} r="2.5" fill="#1e293b" />
                            <circle cx="56" cy={faceY + 1} r="2.5" fill="#1e293b" />
                            <circle cx="44.5" cy={faceY} r="1" fill="#ffffff" />
                            <circle cx="56.5" cy={faceY} r="1" fill="#ffffff" />
                            <path d="M 48 31 Q 50 33 52 31" fill="none" stroke="#7e22ce" strokeWidth="1.5" strokeLinecap="round" />
                            {progress >= 1 && (
                                <g>
                                    <path d="M 47 30 Q 50 35 53 30" fill="#a855f7" stroke="#7e22ce" strokeWidth="1" strokeLinecap="round" />
                                    <g className="text-yellow-400">
                                        <path d="M 28 15 L 30 20 L 35 22 L 30 24 L 28 29 L 26 24 L 21 22 L 26 20 Z" fill="currentColor" />
                                        <path d="M 75 45 L 76 48 L 79 49 L 76 50 L 75 53 L 74 50 L 71 49 L 74 48 Z" fill="currentColor" />
                                    </g>
                                </g>
                            )}
                        </g>
                    </svg>
                </div>
            );
        };

        // --- หน้า Login ---
        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (name.trim()) onLogin(name.trim());
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-violet-600 via-purple-500 to-fuchsia-500 flex items-center justify-center p-6 text-slate-800">
                    <div className="bg-white p-8 rounded-[32px] border border-purple-100 shadow-2xl w-full max-w-sm text-center">
                        <div className="text-6xl mb-4 animate-bounce">🎀</div>
                        <h1 className="text-2xl font-black text-purple-700 mb-2">เข้าสู่ระบบ Cloud</h1>
                        <p className="text-xs text-slate-500 mb-6 font-medium">พิมพ์ชื่อของคุณ ระบบจะซิงค์ข้อมูลกับฐานข้อมูล MyFamilyProject อัตโนมัติ ป้องกันข้อมูลสูญหาย</p>
                        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                            <input
                                type="text"
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                placeholder="ตัวอย่าง: Pattamapron"
                                className="w-full bg-slate-50 border-2 border-purple-100 rounded-2xl px-4 py-3 text-sm font-bold text-slate-700 focus:outline-none focus:border-purple-400 focus:bg-white transition-colors"
                            />
                            <button type="submit" className="w-full bg-gradient-to-r from-fuchsia-500 to-purple-600 text-white font-black text-sm py-3.5 rounded-2xl shadow-lg shadow-purple-200 active:scale-95 transition-transform">
                                โหลดข้อมูล 🚀
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // --- หน้า Dashboard หลัก ที่ผูกกับ Firestore ---
        const Dashboard = ({ user, profileName, onLogout }) => {
            // ระบบ Local-First Cache เพื่อให้แอปโหลดเข้าได้ทันที 0 วินาที
            const localCacheKey = `p45_cache_${profileName}`;
            const cachedDataStr = window.localStorage.getItem(localCacheKey);
            const cachedData = cachedDataStr ? JSON.parse(cachedDataStr) : null;

            // ถ้ามีแคชให้โหลดเข้าแอปทันที ถ้าไม่มีให้โหลดรอ 2 วิ
            const [loadingData, setLoadingData] = useState(!cachedData);
            const [activeTab, setActiveTab] = useState('tracker'); 
            const [showConfetti, setShowConfetti] = useState(false);
            
            const dateString = new Date().toDateString(); 
            
            // ข้อมูลหลักดึงจากแคช หรือ ค่าตั้งต้น
            const [weight, setWeight] = useState(cachedData?.weight || 52.0);
            const [allRecords, setAllRecords] = useState(cachedData?.records || {}); 
            
            // ข้อมูลรายวันจาก Cloud
            const defaultDailyData = {
                water: 0, protein: 0, breakfastDone: false,
                lunchDone: false, snackDone: false, dinnerDone: false,
                exerciseChecks: [false, false, false, false],
                fastingSuccess: false, kneePain: null
            };

            const [dailyData, setDailyData] = useState(() => {
                if (cachedData?.records && cachedData.records[dateString]) {
                    return cachedData.records[dateString];
                }
                return defaultDailyData;
            });
            
            // ระบุ Path ของเอกสารบน Cloud 
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profiles', profileName);

            // ดึงข้อมูล Real-time จาก Cloud
            useEffect(() => {
                if (!user) return;

                // ระบบตั้งเวลาตัดจบ (Timeout 2 วินาที) เผื่อเน็ตมือถือมีปัญหา จะได้เข้าแอปได้เลย
                const timeoutId = setTimeout(() => {
                    setLoadingData(false);
                }, 2000);

                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    clearTimeout(timeoutId); // ปิดตัวนับเวลาถ้าระบบโหลดเสร็จก่อน

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        // เซฟทับลงแคชในเครื่องทันที
                        window.localStorage.setItem(localCacheKey, JSON.stringify(data));

                        if (data.weight) setWeight(data.weight);
                        if (data.records) setAllRecords(data.records); 
                        
                        if (data.records && data.records[dateString]) {
                            setDailyData(data.records[dateString]);
                        } else {
                            setDailyData(defaultDailyData);
                        }
                    } else {
                        setDoc(docRef, { weight: 52.0, records: {} }, { merge: true });
                    }
                    setLoadingData(false);
                }, (error) => {
                    console.error("Cloud connection error", error);
                    setLoadingData(false);
                });

                return () => {
                    clearTimeout(timeoutId);
                    unsubscribe();
                };
            }, [user.uid, profileName, dateString]);

            // ฟังก์ชันอัปเดตข้อมูลขึ้น Cloud อัตโนมัติ
            const updateDaily = (key, value) => {
                const newData = { ...dailyData, [key]: value };
                setDailyData(newData); 

                // อัปเดตแคชในเครื่องให้ไวปรู๊ดปร๊าด
                const newRecords = { ...allRecords, [dateString]: newData };
                setAllRecords(newRecords);
                window.localStorage.setItem(localCacheKey, JSON.stringify({ weight, records: newRecords }));

                // อัปเดต Cloud เบื้องหลัง
                setDoc(docRef, { records: { [dateString]: newData } }, { merge: true });
            };

            const updateWeightToCloud = (newWeight) => {
                setWeight(newWeight);

                // อัปเดตแคชในเครื่อง
                window.localStorage.setItem(localCacheKey, JSON.stringify({ weight: newWeight, records: allRecords }));

                // อัปเดต Cloud เบื้องหลัง
                setDoc(docRef, { weight: newWeight }, { merge: true });
            };

            // เป้าหมายพื้นฐาน
            const targetWeight = 45.0;
            const initialWeight = 52.0;
            const targetWater = 8;
            const targetProtein = 4;
            
            const todayOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const todayStr = new Date().toLocaleDateString('th-TH', todayOptions);

            const planStartDate = new Date(2026, 5, 1); 
            const diffTime = new Date().getTime() - planStartDate.getTime();
            const diffDays = Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1); 
            const totalDays = 60; 
            const overallProgress = Math.min(Math.round((diffDays / totalDays) * 100), 100);

            // ข้อมูลแผนรายวัน
            const dailyPlan = {
                type: 'Arm & Core Focus (Low-Impact)',
                meals: {
                    breakfast: 'ไข่ต้ม 2 ฟอง + นมดีน่าดีไลท์ (สูตรน้ำตาลน้อย)',
                    lunch: 'ข้าวไรซ์เบอร์รี่ (กล่อง) + อกไก่นุ่ม + ผักสลัด 1 ซอง',
                    snack: 'แอปเปิ้ลหั่นชิ้น (เตรียมจากบ้าน) หรือ อัลมอนด์ 1 ซอง',
                    dinner: 'สลัดโรลปูอัด (ซื้อจากร้าน) + น้ำสลัดซีฟู้ด (แตะนิดหน่อย)'
                },
                exercises: [
                    { title: 'Arm Punches (ชกมวยอากาศ)', focus: 'ต้นแขน', detail: 'ชกสลับซ้าย-ขวาเกร็งหน้าท้อง 40 วินาที' },
                    { title: 'Arm Circles (หมุนแขน)', focus: 'หัวไหล่และแขน', detail: 'หมุนเป็นวงกลมเล็กๆ เร็วๆ 40 วินาที' },
                    { title: 'Wall Push-ups (วิดพื้นดันกำแพง)', focus: 'หน้าอกและหลังแขน', detail: 'ดันกำแพงเบาๆ ไม่กระแทกเข่า 40 วินาที' },
                    { title: 'Glute Bridge (สะพานโค้ง)', focus: 'สะโพกและหลังล่าง', detail: 'นอนชันเข่ายกสะโพกขึ้น 40 วินาที' }
                ]
            };

            const convenienceStoreIdeas = [
                { type: 'เช้า', item: 'แซนวิชโฮลวีตทูน่า + อเมริกาโน่ไม่หวาน' }, 
                { type: 'เช้า', item: 'กล้วยหอม 1 ลูก + ไข่ตุ๋นคัพ' },
                { type: 'เที่ยง', item: 'ข้าวกล้อง + ปลาซาบะย่าง (สูตรโซเดียมต่ำ)' }, 
                { type: 'เที่ยง', item: 'เกี๊ยวกุ้งน้ำ (ไม่ซดน้ำซุป) + นมโปรตีนสูง' },
                { type: 'ว่าง', item: 'กรีกโยเกิร์ต (รสธรรมชาติ) + ถั่วแระญี่ปุ่น' }, 
                { type: 'เย็น', item: 'ยำวุ้นเส้น (สำเร็จรูป) + อกไก่ฉีก' },
            ];

            const waterSchedule = [
                { time: '07:00 - 08:00', desc: 'หลังตื่นนอน (กระตุ้นระบบขับถ่าย)', amount: 2, ml: 500 },
                { time: '10:00 - 12:00', desc: 'ช่วงสายถึงเที่ยง (ลดความหิว)', amount: 2, ml: 500 },
                { time: '14:00 - 16:00', desc: 'ช่วงบ่าย (เติมความสดชื่น ผิวสวย)', amount: 2, ml: 500 },
                { time: '18:00 - 20:00', desc: 'มื้อเย็นถึงก่อนนอน (จิบเบาๆ)', amount: 2, ml: 500 },
            ];

            // --- ฟีเจอร์พับเก็บอัตโนมัติ (Auto-Collapse) ---
            const [mealsOpen, setMealsOpen] = useState(true);
            const [proteinOpen, setProteinOpen] = useState(true);
            const [waterOpen, setWaterOpen] = useState(true);
            const [exOpen, setExOpen] = useState(true);

            useEffect(() => {
                const allDone = dailyData.breakfastDone && dailyData.lunchDone && dailyData.snackDone && dailyData.dinnerDone;
                setMealsOpen(!allDone);
            }, [dailyData.breakfastDone, dailyData.lunchDone, dailyData.snackDone, dailyData.dinnerDone]);

            useEffect(() => { setProteinOpen(dailyData.protein < targetProtein); }, [dailyData.protein]);
            useEffect(() => { setWaterOpen(dailyData.water < targetWater); }, [dailyData.water]);
            useEffect(() => {
                const completedEx = dailyData.exerciseChecks.filter(Boolean).length;
                setExOpen(completedEx < dailyPlan.exercises.length);
            }, [dailyData.exerciseChecks]);

            // --- คำนวณคะแนนย้อนหลัง (รวมโปรตีน) ---
            const computeScoreForRecord = (rec) => {
                if (!rec) return 0;
                let s = 0;
                if (rec.breakfastDone) s += 5;
                if (rec.lunchDone) s += 5;
                if (rec.snackDone) s += 5;
                if (rec.dinnerDone) s += 5;
                if (rec.water >= targetWater) s += 20;
                if (rec.protein >= targetProtein) s += 20;
                const exCount = (rec.exerciseChecks || []).filter(Boolean).length;
                s += (exCount / 4) * 20;
                if (rec.fastingSuccess) s += 20;
                return Math.min(Math.round(s), 100);
            };

            const last7Days = Array.from({length: 7}, (_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - 6 + i);
                return d.toDateString();
            });

            // คำนวณคะแนนรวมวันนี้
            let dailyScore = 0;
            if (dailyData.breakfastDone) dailyScore += 5;
            if (dailyData.lunchDone) dailyScore += 5;
            if (dailyData.snackDone) dailyScore += 5;
            if (dailyData.dinnerDone) dailyScore += 5;
            if (dailyData.water >= targetWater) dailyScore += 20;
            if (dailyData.protein >= targetProtein) dailyScore += 20;
            
            const completedExercises = dailyData.exerciseChecks.filter(Boolean).length;
            dailyScore += (completedExercises / dailyPlan.exercises.length) * 20;
            if (dailyData.fastingSuccess) dailyScore += 20;
            dailyScore = Math.min(Math.round(dailyScore), 100);

            useEffect(() => {
                if (dailyScore === 100) {
                    setShowConfetti(true);
                    const timer = setTimeout(() => setShowConfetti(false), 5000);
                    return () => clearTimeout(timer);
                } else setShowConfetti(false);
            }, [dailyScore]);

            const getMotivationalMessage = () => {
                if (dailyScore === 100) return "ภารกิจสำเร็จ! เลื่อนลงไปรับรางวัลด้านล่างเลย 🎁";
                if (dailyScore >= 70) return "ใกล้ได้รางวัลแล้ว อย่าเพิ่งยอมแพ้! 💪";
                if (dailyScore >= 40) return "มาถูกทางแล้ว ลุยต่อเลย! 🏃‍♀️";
                return "พร้อมรับความท้าทายของวันนี้หรือยัง? 🎯";
            };

            const rewardsList = [
                "ส้มตำแซ่บๆ 1 จาน (สั่งลดหวาน/เค็มลงนิดนึงเพื่อสุขภาพ)", "ทุเรียนพูเล็กๆ 1 พู (ให้พอชื่นใจ)", "แซลมอนซาชิมิฟินๆ 1 ชุด",
                "ก๋วยเตี๋ยวชามโปรด 1 ชาม (อร่อยได้แต่งดซดน้ำซุปเยอะน้า)", "จิ้มจุ่มมื้อเย็นฟินๆ (เน้นผักและเนื้อสัตว์ไม่ติดมัน)",
                "ผลไม้สดแช่เย็นฉ่ำๆ (แตงโม หรือ ชมพู่)", "เมี่ยงปลาเผาตัวโตๆ (เน้นกินผักเยอะๆ)", "เงาะ หรือ มะขามหวาน พอให้หายอยาก",
                "อาหารอีสาน 1 อย่างที่อยากกิน (เช่น น้ำตกหมู หรือ ลาบ)", "ฝรั่ง มะละกอ หรือ พุทรา กรอบๆ เย็นๆ"
            ];
            const todayReward = rewardsList[diffDays % rewardsList.length];

            if (loadingData) {
                return (
                    <div className="min-h-screen bg-[#FDFBF7] flex flex-col items-center justify-center text-purple-400">
                        <div className="text-4xl animate-spin mb-4">☁️</div>
                        <p className="font-bold">กำลังดึงข้อมูลจาก Cloud...</p>
                    </div>

                <div className="min-h-screen text-slate-800 pb-24 selection:bg-purple-200 animation-fade-in">
                    {showConfetti && <Confetti />}

                    {/* Header */}
                    <header className="relative bg-gradient-to-br from-violet-600 via-purple-500 to-fuchsia-500 p-6 pb-14 rounded-b-[40px] shadow-md overflow-hidden text-white">
                        <div className="absolute top-0 right-0 w-48 h-48 bg-white opacity-10 rounded-full blur-2xl -translate-y-1/3 translate-x-1/4"></div>
                        <div className="relative z-10">
                            <div className="flex justify-between items-start mb-1">
                                <div>
                                    <p className="text-white/90 font-black text-[11px] tracking-[0.2em] uppercase mb-1">✨ Flexible Fit & Firm</p>
                                    <h1 className="text-4xl font-black tracking-tight leading-none mb-1 uppercase drop-shadow-md text-white">Project <span className="text-pink-300">45</span></h1>
                                    <h2 className="text-base font-bold text-white/90 tracking-wide mt-1">Hello, {profileName}! 🌸</h2>
                                </div>
                                <button onClick={onLogout} className="bg-black/20 hover:bg-black/30 p-2.5 rounded-2xl backdrop-blur-md shadow-sm border border-white/20 flex flex-col items-center transition-colors">
                                    <span className="text-xl">🚪</span>
                                    <span className="text-[8px] font-bold mt-1 uppercase tracking-wider">ออกระบบ</span>
                                </button>
                            </div>
                            <p className="text-white/80 font-medium text-xs mt-3">📅 {todayStr}</p>
                        </div>
                    </header>

                    {/* Floating Cards */}
                    <div className="px-5 -mt-10 relative z-20 space-y-4">
                        <div className="bg-white rounded-[24px] p-5 shadow-xl shadow-purple-100/40 border border-purple-50 flex flex-col">
                            <div className="flex items-center justify-between gap-2">
                                <div className="flex flex-col z-10 shrink-0">
                                    <span className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">🎯 เป้าหมาย: 45.0 กก.</span>
                                    <div className="flex items-baseline gap-1">
                                        <input 
                                            type="number" 
                                            step="0.1" 
                                            value={weight} 
                                            onChange={(e) => updateWeightToCloud(parseFloat(e.target.value) || 0)}
                                            className="w-20 bg-transparent text-4xl font-extrabold text-slate-800 tracking-tighter outline-none border-b-2 border-dashed border-purple-200 focus:border-purple-500 transition-colors"
                                        />
                                        <span className="text-slate-500 font-bold">กก.</span>
                                    </div>
                                </div>
                                <div className="flex-1 flex justify-center"><TransformationAvatar weight={weight} targetWeight={targetWeight} initialWeight={initialWeight} /></div>
                                <div className="flex flex-col gap-1.5 bg-slate-50 p-1.5 rounded-[16px] border border-slate-100 z-10 shrink-0">
                                    <button onClick={() => updateWeightToCloud(Number((weight + 0.1).toFixed(1)))} className="w-8 h-8 bg-white rounded-[10px] text-slate-400 font-bold text-xl shadow-sm border border-slate-100 active:scale-95 leading-none">+</button>
                                    <button onClick={() => updateWeightToCloud(Math.max(40, Number((weight - 0.1).toFixed(1))))} className="w-8 h-8 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-[10px] text-white font-bold text-xl shadow-md shadow-emerald-200 active:scale-95 leading-none">-</button>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-[24px] p-5 shadow-lg shadow-purple-100/30 border border-slate-50">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="font-bold text-slate-700 text-sm">🏆 ความสำเร็จของแคมเปญ</h3>
                                <span className="text-xs font-black text-slate-400">วันที่ {diffDays > 0 ? diffDays : '0'} / 60</span>
                            </div>
                            <div className="relative w-full bg-slate-100 h-3 rounded-full overflow-hidden mb-2">
                                <div className="absolute top-0 left-0 h-full bg-gradient-to-r from-pink-400 via-fuchsia-500 to-purple-600 rounded-full transition-all duration-1000 ease-out" style={{ width: `${overallProgress}%` }}></div>
                            </div>
                            <div className="flex justify-between text-[10px] font-bold text-slate-400 uppercase">
                                <span>Start</span><span className="text-purple-500">{overallProgress}%</span><span>Goal</span>
                            </div>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="flex justify-center gap-2 mt-8 px-5">
                        <button onClick={() => setActiveTab('tracker')} className={`flex-1 py-3.5 px-2 rounded-2xl font-bold text-xs flex items-center justify-center gap-1 transition-all duration-300 ${activeTab === 'tracker' ? 'bg-slate-900 text-white shadow-xl shadow-slate-300 translate-y-[-2px]' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}>
                            💖 เช็คลิสต์
                        </button>
                        <button onClick={() => setActiveTab('plan')} className={`flex-1 py-3.5 px-2 rounded-2xl font-bold text-xs flex items-center justify-center gap-1 transition-all duration-300 ${activeTab === 'plan' ? 'bg-slate-900 text-white shadow-xl shadow-slate-300 translate-y-[-2px]' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}>

                        </button>
                        <button onClick={() => setActiveTab('stats')} className={`flex-1 py-3.5 px-2 rounded-2xl font-bold text-xs flex items-center justify-center gap-1 transition-all duration-300 ${activeTab === 'stats' ? 'bg-slate-900 text-white shadow-xl shadow-slate-300 translate-y-[-2px]' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}>
                            📊 สถิติ
                        </button>
                    </div>

                    <main className="px-5 mt-6 space-y-6">
                        {activeTab === 'tracker' ? (
                            <>
                                {/* พลังงานวันนี้ */}
                                <section className={`rounded-[24px] p-6 shadow-sm border flex items-center justify-between relative overflow-hidden transition-colors duration-500 ${dailyScore === 100 ? 'bg-purple-500 border-purple-400 text-white' : 'bg-white border-slate-100 text-slate-800'}`}>
                                    <div className="relative z-10 max-w-[60%]">
                                        <h2 className="font-extrabold text-lg mb-1">พลังงานวันนี้</h2>
                                        <p className={`text-sm font-bold leading-snug ${dailyScore === 100 ? 'text-purple-100' : 'text-slate-500'}`}>{getMotivationalMessage()}</p>
                                    </div>
                                    <div className="relative w-20 h-20 flex items-center justify-center shrink-0">
                                        <svg className="w-full h-full transform -rotate-90 drop-shadow-sm" viewBox="0 0 36 36">
                                            <path className={dailyScore === 100 ? 'text-purple-400' : 'text-slate-100'} strokeWidth="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                            <path className={`transition-all duration-1000 ease-out ${dailyScore === 100 ? 'text-white' : 'text-purple-500'}`} strokeDasharray={`${dailyScore}, 100`} strokeWidth="3.5" strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                        </svg>
                                        <div className="absolute flex flex-col items-center justify-center"><span className="text-xl font-extrabold">{dailyScore}</span></div>
                                    </div>
                                </section>

                                {/* กล่องของขวัญ */}
                                <section className={`rounded-[24px] p-5 shadow-sm border transition-all duration-500 ${dailyScore === 100 ? 'bg-gradient-to-r from-fuchsia-50 to-purple-100 border-purple-200' : 'bg-slate-50 border-slate-100'}`}>
                                    <div className="flex items-center gap-4">
                                        <div className={`w-14 h-14 rounded-[18px] flex items-center justify-center shrink-0 text-2xl ${dailyScore === 100 ? 'bg-purple-500 text-white shadow-lg shadow-purple-200' : 'bg-white text-slate-300 border border-slate-200'}`}>🎁</div>
                                        <div>
                                            <h3 className={`font-black text-sm uppercase tracking-wide ${dailyScore === 100 ? 'text-purple-800' : 'text-slate-400'}`}>{dailyScore === 100 ? 'ปลดล็อกรางวัลคนเก่ง!' : 'ของรางวัลพิเศษรออยู่'}</h3>
                                            <p className={`text-xs mt-1.5 font-medium leading-relaxed ${dailyScore === 100 ? 'text-purple-700' : 'text-slate-500'}`}>{dailyScore === 100 ? `ยอดเยี่ยมมาก! วันนี้ได้สิทธิ์ทาน "${todayReward}" ให้รางวัลตัวเองเลยค่ะ 🎉` : 'ทำภารกิจทั้งหมดให้ครบ 100% เพื่อปลดล็อกอาหารของโปรดวันนี้!'}</p>
                                        </div>
                                    </div>
                                </section>

                                {/* วินัยการกิน */}
                                <section className="bg-white rounded-[24px] p-5 border border-slate-100 shadow-sm transition-all duration-500">
                                    <div className="flex items-center justify-between cursor-pointer" onClick={() => setMealsOpen(!mealsOpen)}>
                                        <h2 className="font-black text-slate-800 px-1 flex items-center gap-2 uppercase tracking-wide text-sm">🥗 วินัยการกิน (20 Pts)</h2>
                                        <span className="text-slate-400 text-xs">{mealsOpen ? '🔽 พับเก็บ' : '▶️ เปิดดู'}</span>
                                    </div>
                                    {mealsOpen && (
                                    <div className="grid gap-3 mt-4 animation-fade-in">
                                        {[
                                            { key: 'breakfastDone', state: dailyData.breakfastDone, icon: '🥞', title: 'มื้อเช้า', time: '10:00', desc: dailyPlan.meals.breakfast, color: 'fuchsia' },
                                            { key: 'lunchDone', state: dailyData.lunchDone, icon: '🍱', title: 'มื้อเที่ยง', time: '13:00', desc: dailyPlan.meals.lunch, color: 'purple' },
                                            { key: 'snackDone', state: dailyData.snackDone, icon: '🧁', title: 'มื้อว่าง', time: '16:00', desc: dailyPlan.meals.snack, color: 'violet' },
                                            { key: 'dinnerDone', state: dailyData.dinnerDone, icon: '🍲', title: 'มื้อเย็น', time: '18:30', desc: dailyPlan.meals.dinner, color: 'indigo' }
                                        ].map((meal, idx) => (
                                            <div key={idx} onClick={() => updateDaily(meal.key, !meal.state)} className={`p-4 rounded-[20px] cursor-pointer flex items-center justify-between transition-all duration-300 active:scale-95 ${meal.state ? 'bg-slate-50/50 shadow-inner border border-slate-100 opacity-60' : 'bg-white shadow-sm border border-slate-100'}`}>
                                                <div className="flex items-center gap-3.5">
                                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-xl transition-colors ${meal.state ? `bg-${meal.color}-100 text-${meal.color}-500` : 'bg-slate-50 text-slate-400'}`}>{meal.icon}</div>
                                                    <div>
                                                        <h3 className={`font-extrabold text-sm transition-all ${meal.state ? 'text-slate-400 line-through decoration-slate-300' : 'text-slate-800'}`}>{meal.title} <span className="text-[10px] font-bold text-slate-400 ml-1 bg-slate-100 px-1.5 py-0.5 rounded uppercase">{meal.time}</span></h3>
                                                        <p className={`text-xs mt-1 line-clamp-1 font-medium ${meal.state ? 'text-slate-400' : 'text-slate-500'}`}>{meal.desc}</p>
                                                    </div>
                                                </div>
                                                <div className={`w-7 h-7 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors ${meal.state ? `border-${meal.color}-500 bg-${meal.color}-500` : 'border-slate-200'}`}>
                                                    {meal.state && <span className="text-white text-xs font-bold">✓</span>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    )}
                                </section>

                                {/* สะสมโปรตีน */}
                                <section className="bg-white rounded-[24px] p-6 shadow-sm border border-slate-100 relative overflow-hidden mt-6 transition-all duration-500">
                                    <div className="absolute bottom-0 left-0 right-0 bg-pink-50/60 transition-all duration-700 -z-0" style={{ height: `${Math.min((dailyData.protein/targetProtein)*100, 100)}%` }}></div>
                                    <div className="relative z-10">
                                        <div className="flex items-center justify-between mb-3 cursor-pointer" onClick={() => setProteinOpen(!proteinOpen)}>
                                            <h2 className="font-black text-slate-800 text-sm uppercase tracking-wide">🥩 สะสมโปรตีน (20 Pts)</h2>
                                            <div className="flex items-center gap-2">
                                                <div className="bg-pink-100 text-pink-700 px-3 py-1 rounded-full text-xs font-bold">{dailyData.protein} / {targetProtein} ฝ่ามือ</div>
                                                <span className="text-slate-400 text-xs">{proteinOpen ? '🔽' : '▶️'}</span>
                                            </div>
                                        </div>
                                        {proteinOpen && (
                                        <div className="animation-fade-in">
                                            <div className="bg-white/80 backdrop-blur-sm p-3 rounded-xl border border-pink-100 mb-5">
                                                <p className="text-[10px] text-pink-600 font-bold mb-1">กะง่ายๆ 1 ฝ่ามือหนาๆ = 1 แต้ม:</p>
                                                <p className="text-[10px] text-slate-500 font-medium">เนื้อสัตว์ 1 ฝ่ามือ, ไข่ต้ม 2 ฟอง, อกไก่เซเว่น 1 ชิ้น หรือ นมโปรตีนสูง 1 ขวด</p>
                                            </div>
                                            <div className="flex items-center justify-center gap-6 mb-2">
                                                <button onClick={() => updateDaily('protein', Math.max(0, dailyData.protein - 1))} className="w-12 h-12 rounded-[16px] bg-white border border-slate-200 text-xl font-medium text-slate-500 active:scale-95">-</button>
                                                <div className="text-6xl transition-all duration-500" style={{ filter: dailyData.protein >= targetProtein ? 'drop-shadow(0px 4px 6px rgba(236, 72, 153, 0.5))' : 'grayscale(1)' }}>🍗</div>
                                                <button onClick={() => updateDaily('protein', dailyData.protein + 1)} className="w-12 h-12 rounded-[16px] bg-pink-500 text-white text-xl font-bold active:scale-95 shadow-lg shadow-pink-200">+</button>
                                            </div>
                                        </div>
                                        )}
                                    </div>
                                </section>

                                {/* เติมน้ำ */}
                                <section className="bg-white rounded-[24px] p-6 shadow-sm border border-slate-100 relative overflow-hidden mt-6 transition-all duration-500">
                                    <div className="absolute bottom-0 left-0 right-0 bg-blue-50/60 transition-all duration-700 -z-0" style={{ height: `${Math.min((dailyData.water/targetWater)*100, 100)}%` }}></div>
                                    <div className="relative z-10">
                                        <div className="flex items-center justify-between mb-4 cursor-pointer" onClick={() => setWaterOpen(!waterOpen)}>
                                            <h2 className="font-black text-slate-800 text-sm uppercase tracking-wide">🧊 เติมความสดชื่น (20 Pts)</h2>
                                            <div className="flex items-center gap-2">
                                                <div className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">{dailyData.water} / {targetWater} แก้ว</div>
                                                <span className="text-slate-400 text-xs">{waterOpen ? '🔽' : '▶️'}</span>
                                            </div>
                                        </div>
                                        {waterOpen && (
                                        <div className="animation-fade-in">
                                            <div className="flex items-center justify-center gap-6 mb-6">
                                                <button onClick={() => updateDaily('water', Math.max(0, dailyData.water - 1))} className="w-12 h-12 rounded-[16px] bg-white border border-slate-200 text-xl font-medium text-slate-500 active:scale-95">-</button>
                                                <div className="text-6xl transition-all duration-500" style={{ filter: dailyData.water >= targetWater ? 'drop-shadow(0px 4px 6px rgba(59, 130, 246, 0.5))' : 'grayscale(1)' }}>💧</div>
                                                <button onClick={() => updateDaily('water', dailyData.water + 1)} className="w-12 h-12 rounded-[16px] bg-blue-500 text-white text-xl font-bold active:scale-95 shadow-lg shadow-blue-200">+</button>
                                            </div>
                                            
                                            <div className="mt-4 pt-4 border-t border-blue-100/50">
                                                <h3 className="text-xs font-bold text-slate-600 mb-3 text-center">ตารางดื่มน้ำให้ครบ 2 ลิตร/วัน (แก้วละ ~250 ml)</h3>
                                                <div className="space-y-2">
                                                    {waterSchedule.map((item, idx) => (
                                                        <div key={idx} className="flex items-center justify-between bg-blue-50/50 p-2.5 rounded-xl border border-blue-50">
                                                            <div className="flex flex-col gap-0.5">
                                                                <span className="text-[10px] font-black text-blue-600 w-max bg-blue-100/80 px-2 py-0.5 rounded-md">{item.time}</span>
                                                                <span className="text-[10px] font-medium text-slate-500 ml-1">{item.desc}</span>
                                                            </div>
                                                            <div className="text-[10px] font-bold text-blue-800 bg-white px-2.5 py-1.5 rounded-lg shadow-sm whitespace-nowrap">
                                                                {item.amount} แก้ว <span className="text-slate-400 font-normal">({item.ml}ml)</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        )}
                                    </div>
                                </section>

                                {/* ขยับร่างกาย */}
                                <section className="bg-white rounded-[24px] p-5 border border-slate-100 shadow-sm mt-6 transition-all duration-500">
                                    <div className="flex items-center justify-between cursor-pointer" onClick={() => setExOpen(!exOpen)}>
                                        <div>
                                            <h2 className="font-black text-slate-800 px-1 flex items-center gap-2 uppercase tracking-wide text-sm">💃 ขยับร่างกายวันนี้ (20 Pts)</h2>
                                            <p className="text-[11px] text-emerald-600 font-bold mt-1 px-1">เป้าหมาย: ลดต้นแขน & หน้าท้อง</p>
                                        </div>
                                        <span className="text-slate-400 text-xs shrink-0">{exOpen ? '🔽 พับเก็บ' : '▶️ เปิดดู'}</span>
                                    </div>
                                    {exOpen && (
                                    <div className="grid gap-3 mt-4 animation-fade-in">
                                        {dailyPlan.exercises.map((ex, idx) => {
                                            const isDone = dailyData.exerciseChecks[idx] || false;
                                            return (
                                            <div key={idx} onClick={() => {
                                                const newChecks = [...dailyData.exerciseChecks];
                                                newChecks[idx] = !isDone;
                                                updateDaily('exerciseChecks', newChecks);
                                            }} className={`p-4 rounded-[20px] cursor-pointer flex items-center justify-between transition-all duration-300 active:scale-95 ${isDone ? 'bg-slate-50/50 shadow-inner border border-slate-100 opacity-60' : 'bg-white shadow-sm border border-slate-100'}`}>
                                                <div className="flex items-center gap-3.5">
                                                    <div className={`w-10 h-10 shrink-0 rounded-2xl flex items-center justify-center transition-colors ${isDone ? 'bg-emerald-100 text-emerald-500' : 'bg-slate-50 text-slate-400'}`}><span className="font-black text-sm">{idx + 1}</span></div>
                                                    <div className="pr-2">
                                                        <h3 className={`font-extrabold text-sm transition-all leading-tight ${isDone ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{ex.title}</h3>
                                                        <p className={`text-[11px] mt-1.5 font-medium leading-snug ${isDone ? 'text-slate-400' : 'text-slate-500'}`}>
                                                            <span className={`px-1.5 py-0.5 rounded-md mr-1.5 ${isDone ? 'bg-slate-100 text-slate-400' : 'bg-emerald-50 text-emerald-600'}`}>🎯 {ex.focus}</span>
                                                            {ex.detail}
                                                        </p>
                                                    </div>
                                                </div>
                                                <div className={`w-7 h-7 shrink-0 rounded-full border-2 flex items-center justify-center transition-colors ${isDone ? 'border-emerald-500 bg-emerald-500' : 'border-slate-200 bg-white'}`}>
                                                    {isDone && <span className="text-white text-xs font-bold">✓</span>}
                                                </div>
                                            </div>
                                        )})}
                                    </div>
                                    )}
                                </section>

                                {/* IF และ ปวดเข่า */}
                                <section className="grid grid-cols-2 gap-4 my-6">
                                    <div onClick={() => updateDaily('fastingSuccess', !dailyData.fastingSuccess)} className={`p-4 rounded-[24px] border-2 cursor-pointer transition-all duration-300 flex flex-col justify-between active:scale-95 ${dailyData.fastingSuccess ? 'border-indigo-500 bg-indigo-50' : 'border-transparent bg-white shadow-sm'}`}>
                                        <div className="flex items-center justify-between mb-3">
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-xl ${dailyData.fastingSuccess ? 'bg-indigo-500 text-white shadow-md' : 'bg-slate-100 text-slate-500'}`}>🌌</div>
                                            <div className={`relative w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors ${dailyData.fastingSuccess ? 'border-indigo-500 bg-indigo-500' : 'border-slate-200'}`}>
                                                {dailyData.fastingSuccess && <span className="text-white text-[10px] font-bold">✓</span>}
                                            </div>
                                        </div>
                                        <div>
                                            <h3 className={`font-extrabold text-sm ${dailyData.fastingSuccess ? 'text-indigo-800' : 'text-slate-800'}`}>งดมื้อดึก (IF)</h3>
                                            <p className="text-[10px] text-slate-500 font-bold mt-1">20 Pts • หลัง 19:00 น.</p>
                                        </div>
                                    </div>

                                    <div className="p-4 rounded-[24px] border border-slate-100 bg-white shadow-sm flex flex-col justify-between">
                                        <h2 className="font-black text-xs text-slate-500 mb-2 uppercase flex items-center gap-1">🦵 เช็คสภาพหัวเข่า</h2>
                                        <div className="flex justify-between gap-1 mt-auto">
                                            <button onClick={() => updateDaily('kneePain', 'none')} className={`flex-1 py-2 rounded-xl flex flex-col items-center gap-1 transition-all duration-300 ${dailyData.kneePain === 'none' ? 'bg-emerald-500 text-white shadow-md' : 'bg-slate-50 text-slate-400'}`}>
                                                <span>🥰</span><span className="text-[9px] font-bold">ปกติ</span>
                                            </button>
                                            <button onClick={() => updateDaily('kneePain', 'mild')} className={`flex-1 py-2 rounded-xl flex flex-col items-center gap-1 transition-all duration-300 ${dailyData.kneePain === 'mild' ? 'bg-yellow-400 text-yellow-900 shadow-md' : 'bg-slate-50 text-slate-400'}`}>
                                                <span>🥺</span><span className="text-[9px] font-bold">ตึงนิดๆ</span>
                                            </button>
                                        </div>
                                    </div>
                                </section>
                            </>
                        ) : activeTab === 'plan' ? (
                            <div className="space-y-6 pb-10 animation-fade-in">
                                <section className="bg-white rounded-[24px] p-6 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="font-extrabold text-lg text-slate-800 flex items-center gap-2">🍱 แผนเสบียง: {dailyPlan.day}</h2>
                                        <div className="bg-purple-50 text-purple-600 text-[10px] font-black px-2 py-1 rounded uppercase tracking-wide">Convenience Mode</div>
                                    </div>
                                    <div className="space-y-6 relative ml-3">
                                        <div className="absolute left-4 top-2 bottom-2 w-0.5 bg-slate-100 -z-10"></div>
                                        {[
                                            { time: '10:00', meal: 'มื้อเช้า', desc: dailyPlan.meals.breakfast, icon: '🥞', color: 'bg-fuchsia-100 text-fuchsia-600', dot: 'border-fuchsia-400' },
                                            { time: '13:00', meal: 'มื้อเที่ยง', desc: dailyPlan.meals.lunch, icon: '🍱', color: 'bg-purple-100 text-purple-600', dot: 'border-purple-400' },
                                            { time: '16:00', meal: 'มื้อว่าง', desc: dailyPlan.meals.snack, icon: '🧁', color: 'bg-violet-100 text-violet-600', dot: 'border-violet-400' },
                                            { time: '18:30', meal: 'มื้อเย็น', desc: dailyPlan.meals.dinner, icon: '🍲', color: 'bg-indigo-100 text-indigo-600', dot: 'border-indigo-400' }
                                        ].map((item, idx) => (
                                            <div key={idx} className="flex gap-4 items-start relative">
                                                <div className={`w-8 h-8 rounded-full border-4 ${item.dot} bg-white flex items-center justify-center shrink-0 shadow-sm mt-1 -ml-1 text-xs`}>{item.icon}</div>
                                                <div className="bg-slate-50 p-4 rounded-[20px] flex-1 border border-transparent shadow-sm">
                                                    <div className="flex items-center gap-2 mb-1.5">
                                                        <span className={`text-[10px] font-black uppercase px-2 py-0.5 rounded-md ${item.color}`}>{item.time}</span>
                                                        <h3 className="font-extrabold text-slate-800 text-sm">{item.meal}</h3>
                                                    </div>
                                                    <p className="text-sm font-medium text-slate-500 leading-snug">{item.desc}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-6 pt-5 border-t border-slate-100">
                                        <h3 className="font-bold text-slate-700 text-xs uppercase tracking-wide mb-3 flex items-center gap-1.5">⭐ ไอเดียเมนูร้านสะดวกซื้อ</h3>
                                        <div className="grid grid-cols-1 gap-2">
                                            {convenienceStoreIdeas.map((idea, idx) => (
                                                <div key={idx} className="flex items-center gap-2 text-[11px] text-slate-500 bg-white p-2 rounded-lg border border-slate-50">
                                                    <span className="font-bold text-slate-700 bg-slate-100 px-1.5 py-0.5 rounded shrink-0">{idea.type}</span>{idea.item}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </section>

                                <section className="bg-slate-900 rounded-[24px] p-6 shadow-md border border-slate-800 mb-10 text-white relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500 opacity-20 rounded-full blur-2xl -translate-y-1/2 translate-x-1/4"></div>
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-end mb-5">
                                            <div>
                                                <h2 className="font-black text-lg text-white flex items-center gap-2 tracking-wide uppercase">💃 ขยับร่างกายวันนี้</h2>
                                                <p className="text-xs font-bold text-emerald-400 mt-1 uppercase tracking-widest">{dailyPlan.type}</p>
                                            </div>
                                        </div>
                                        <div className="space-y-3">
                                            {dailyPlan.exercises.map((ex, idx) => {
                                                const isDone = dailyData.exerciseChecks[idx];
                                                return (
                                                <div key={idx} className={`flex items-center gap-3 p-3.5 rounded-[16px] border transition-all ${isDone ? 'bg-emerald-500/20 border-emerald-500/50' : 'bg-white/10 border-white/5'}`}>
                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-black shadow-md transition-colors ${isDone ? 'bg-emerald-500 text-white' : 'bg-purple-500 text-white'}`}>
                                                        {isDone ? '✓' : idx + 1}
                                                    </div>
                                                    <div>
                                                        <span className={`text-sm font-bold transition-all block leading-tight ${isDone ? 'text-emerald-300 line-through decoration-emerald-500/50' : 'text-white/90'}`}>{ex.title}</span>
                                                        <span className={`text-[10px] mt-1 block ${isDone ? 'text-emerald-400/70' : 'text-slate-400'}`}>{ex.focus} — {ex.detail}</span>
                                                    </div>
                                                </div>
                                            )})}
                                        </div>
                                        <div className="mt-5 p-4 bg-white/5 rounded-[16px] text-xs font-medium text-slate-300 flex items-start gap-3 border border-white/10 leading-relaxed">
                                            <span className="text-lg">🥺</span>
                                            <p>ทำท่าละ 40 วินาที พัก 20 วินาที ทำวนให้ครบ 4 รอบ <strong className="text-white">ระวัง! หากเจ็บแปล๊บที่เข่าให้หยุดทำทันที</strong></p>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        ) : activeTab === 'stats' ? (
                            <div className="space-y-6 pb-10 animation-fade-in">
                                <section className="bg-white rounded-[24px] p-6 shadow-sm border border-slate-100">
                                    <h2 className="font-black text-lg text-slate-800 mb-2 flex items-center gap-2">📊 สถิติพลังงาน 7 วันย้อนหลัง</h2>
                                    <p className="text-xs text-slate-500 mb-6">แถบกราฟแสดงคะแนนความสำเร็จของแต่ละวัน</p>
                                    
                                    <div className="flex items-end justify-between h-48 gap-2 mt-4 pt-4 border-t border-slate-100">
                                        {last7Days.map((dateStr, i) => {
                                            const rec = allRecords[dateStr];
                                            const score = computeScoreForRecord(rec);
                                            const dayObj = new Date(dateStr);
                                            const dayName = dayObj.toLocaleDateString('th-TH', {weekday: 'short'});
                                            const isToday = dateStr === dateString;
                                            
                                            // ใช้ dailyScore สดๆ สำหรับวันนี้
                                            const finalScore = isToday ? dailyScore : score;
                                            
                                            return (
                                                <div key={dateStr} className="flex flex-col items-center flex-1 gap-2 h-full">
                                                    <span className="text-[10px] font-bold text-purple-600">{finalScore}%</span>
                                                    <div className="w-full bg-slate-100 rounded-t-xl relative flex items-end justify-center h-full overflow-hidden border border-slate-50">
                                                        <div className={`w-full rounded-t-xl transition-all duration-1000 ${finalScore === 100 ? 'bg-gradient-to-t from-fuchsia-500 to-purple-400' : 'bg-gradient-to-t from-slate-300 to-slate-200'}`} style={{height: `${finalScore}%`}}></div>
                                                    </div>
                                                    <span className={`text-[10px] ${isToday ? 'font-black text-slate-800' : 'text-slate-500'}`}>{isToday ? 'วันนี้' : dayName}</span>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </section>

                                <section className="bg-white rounded-[24px] p-6 shadow-sm border border-slate-100">
                                    <h2 className="font-black text-sm text-slate-500 uppercase tracking-wide mb-4">🏆 สรุปภาพรวม</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-slate-50 p-4 rounded-[16px] border border-slate-100 text-center">
                                            <p className="text-[10px] text-slate-500 font-bold mb-1">น้ำหนักปัจจุบัน</p>
                                            <p className="text-2xl font-black text-slate-800">{weight.toFixed(1)} <span className="text-xs font-normal text-slate-500">กก.</span></p>
                                        </div>
                                        <div className="bg-purple-50 p-4 rounded-[16px] border border-purple-100 text-center">
                                            <p className="text-[10px] text-purple-500 font-bold mb-1">เป้าหมายลดอีก</p>
                                            <p className="text-2xl font-black text-purple-600">{Math.max(0, weight - targetWeight).toFixed(1)} <span className="text-xs font-normal text-purple-400">กก.</span></p>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        ) : null}
                    </main>
                </div>
            );
        };

        // --- Container หลักและเชื่อมต่อระบบ Auth ---
        const MainContainer = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(() => window.localStorage.getItem('p45_current_profile'));

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth error", error);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = (name) => {
                setCurrentUser(name);
                window.localStorage.setItem('p45_current_profile', name);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                window.localStorage.removeItem('p45_current_profile');
            };

            if (authLoading) return <div className="text-purple-400 text-center mt-20 text-lg font-bold">กำลังเชื่อมต่อฐานข้อมูล Cloud... ☁️</div>;
            if (!user || !currentUser) return <LoginScreen onLogin={handleLogin} />;

            return <Dashboard user={user} profileName={currentUser} onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainContainer />);
    </script>
</body>
</html>
