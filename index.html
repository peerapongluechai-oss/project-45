<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project 45: Flexible Fit & Firm</title>

    <!-- PWA: โค้ดทำแอปเต็มจอมือถือ (ธีมเจ้าหญิงสีพาสเทล) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#faf5ff">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👸</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👸</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #faf5ff; } 
        @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        @keyframes float-avatar { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
        .animate-float-avatar { animation: float-avatar 3.5s ease-in-out infinite; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        // เชื่อมต่อ Firebase อย่างปลอดภัย
        const getFirebaseConfig = () => {
            // โค้ดบรรทัดนี้สำคัญมาก! ป้องกัน Error (custom-token-mismatch) เวลาดูในหน้าจอพรีวิว
            if (typeof __firebase_config !== 'undefined' && __firebase_config) return JSON.parse(__firebase_config);
            
            // กุญแจของลูกพี่สำหรับใช้งานจริงบน GitHub
            return {
                apiKey: "AIzaSyAmQFwL7zniKTnT2INt93iHOlCuT97hC7g",
                authDomain: "myfamilyproject-ecff4.firebaseapp.com",
                projectId: "myfamilyproject-ecff4",
                storageBucket: "myfamilyproject-ecff4.firebasestorage.app",
                messagingSenderId: "714527535272",
                appId: "1:714527535272:web:fefa9679e822d31e52529d",
                measurementId: "G-ED3NCQF2CD"
            };
        };

        const app = initializeApp(getFirebaseConfig());
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'project45_github_app';

        const Confetti = () => (
            <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                {Array.from({ length: 60 }).map((_, i) => (
                    <div key={i} className="absolute top-[-10%]" style={{
                        left: `${Math.random() * 100}%`, width: `${Math.random() * 10 + 5}px`, height: `${Math.random() * 10 + 5}px`,
                        backgroundColor: ['#c084fc', '#e879f9', '#f472b6', '#fbbf24', '#f8fafc'][Math.floor(Math.random() * 5)], borderRadius: Math.random() > 0.5 ? '50%' : '4px',
                        animation: `confetti-fall ${Math.random() * 2.5 + 2}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`, animationDelay: `${Math.random() * 0.5}s`,
                    }} />
                ))}
            </div>
        );

        const CuteGirlAvatar = ({ weight, targetWeight, initialWeight }) => {
            const progress = Math.max(0, Math.min(1, (initialWeight - weight) / (initialWeight - targetWeight)));
            const bodyWidth = 36 - (14 * progress); 
            const faceY = 32;

            return (
                <div className="relative w-32 h-32 flex items-center justify-center mx-2 group">
                    <div className="absolute -top-3 whitespace-nowrap bg-white/95 px-3 py-1 rounded-full text-[10px] font-black text-purple-600 shadow-md border border-purple-100 z-10 transition-all duration-500 transform group-hover:-translate-y-1">
                        {progress >= 1 ? 'สวยปัง หุ่นสับมาก! ✨👸' : progress > 0.6 ? 'สวยขึ้นเยอะเลย! 💖' : progress > 0.3 ? 'สู้ๆ น้าคนเก่ง! 🌸' : 'เริ่มภารกิจคนสวย! 🎀'}
                    </div>
                    <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-xl transition-transform duration-300">
                        <g className="animate-float-avatar">
                            <circle cx="50" cy={faceY} r="18" fill="#4a3b32" />
                            <circle cx="32" cy={faceY - 8} r="8" fill="#4a3b32" />
                            <circle cx="68" cy={faceY - 8} r="8" fill="#4a3b32" />
                            <path d="M 28 20 L 36 28 M 36 20 L 28 28" stroke="#f472b6" strokeWidth="2.5" strokeLinecap="round" />
                            <path d="M 72 20 L 64 28 M 64 20 L 72 28" stroke="#f472b6" strokeWidth="2.5" strokeLinecap="round" />
                            <rect x="42" y="65" width="5.5" height="28" rx="2.5" fill="#fbcfe8" />
                            <rect x="52.5" y="65" width="5.5" height="28" rx="2.5" fill="#fbcfe8" />
                            <path d="M 41 85 L 48.5 85 L 48.5 94 Q 45 96 41 94 Z" fill="#ffffff" />
                            <path d="M 51.5 85 L 59 85 L 59 94 Q 55 96 51.5 94 Z" fill="#ffffff" />
                            <rect x="42" y="80" width="5.5" height="5" fill="#e879f9" />
                            <rect x="52.5" y="80" width="5.5" height="5" fill="#e879f9" />
                            <rect x={50 - bodyWidth/2} y="50" width={bodyWidth} height="22" rx="8" fill="#c084fc" className="transition-all duration-700 ease-out" />
                            <path d={`M ${50 - bodyWidth/2} 62 Q 50 68 ${50 + bodyWidth/2} 62`} fill="none" stroke="#e879f9" strokeWidth="2" className="transition-all duration-700 ease-out" />
                            <path d={`M ${50 - bodyWidth/2 + 2} 55 Q 35 65 38 75`} fill="none" stroke="#ffe4e1" strokeWidth="5.5" strokeLinecap="round" className="transition-all duration-700 ease-out" />
                            <path d={`M ${50 + bodyWidth/2 - 2} 55 Q 65 65 62 75`} fill="none" stroke="#ffe4e1" strokeWidth="5.5" strokeLinecap="round" className="transition-all duration-700 ease-out" />
                            <rect x="46" y={faceY + 12} width="8" height="6" fill="#ffe4e1" />
                            <circle cx="50" cy={faceY} r="14.5" fill="#ffe4e1" />
                            <path d="M 36 28 Q 50 18 64 28 Q 50 22 36 28" fill="#4a3b32" />
                            <path d="M 37 32 Q 43 20 50 25 Q 45 25 37 32" fill="#4a3b32" />
                            <ellipse cx="41" cy={faceY + 4} rx="3" ry="1.8" fill="#fda4af" opacity="0.8" />
                            <ellipse cx="59" cy={faceY + 4} rx="3" ry="1.8" fill="#fda4af" opacity="0.8" />
                            <circle cx="43" cy={faceY} r="2.2" fill="#334155" />
                            <circle cx="57" cy={faceY} r="2.2" fill="#334155" />
                            <circle cx="43.5" cy={faceY - 0.5} r="0.8" fill="#ffffff" />
                            <circle cx="57.5" cy={faceY - 0.5} r="0.8" fill="#ffffff" />
                            <path d="M 47 36 Q 50 39 53 36" fill="none" stroke="#64748b" strokeWidth="1.2" strokeLinecap="round" />
                            <path d="M 36 25 Q 50 18 64 25" fill="none" stroke="#d946ef" strokeWidth="3.5" strokeLinecap="round" />
                            {progress < 0.4 && (<g opacity={1 - progress*2}><path d="M 64 22 Q 66 26 64 28 Q 62 26 64 22 Z" fill="#7dd3fc" /></g>)}
                            {progress >= 0.8 && (
                                <g className="text-yellow-300" opacity={progress}>
                                    <path d="M 22 25 L 24 30 L 29 32 L 24 34 L 22 39 L 20 34 L 15 32 L 20 30 Z" fill="currentColor" className="animate-pulse"/>
                                    <path d="M 78 45 L 79 48 L 82 49 L 79 50 L 78 53 L 77 50 L 74 49 L 77 48 Z" fill="currentColor" className="animate-pulse" style={{animationDelay: '0.5s'}}/>
                                    <path d="M 25 65 L 26 68 L 29 69 L 26 70 L 25 73 L 24 70 L 21 69 L 24 68 Z" fill="#f472b6" className="animate-pulse" style={{animationDelay: '0.2s'}}/>
                                </g>
                            )}
                        </g>
                    </svg>
                </div>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');
            const handleSubmit = (e) => { e.preventDefault(); if (name.trim()) onLogin(name.trim()); };
            return (
                <div className="min-h-screen bg-gradient-to-br from-fuchsia-100 via-purple-100 to-pink-100 flex items-center justify-center p-6 text-slate-800 relative overflow-hidden">
                    <div className="absolute top-10 left-10 w-48 h-48 bg-purple-300 rounded-full blur-[80px] opacity-40"></div>
                    <div className="absolute bottom-10 right-10 w-48 h-48 bg-pink-300 rounded-full blur-[80px] opacity-40"></div>
                    <div className="glass-card p-8 rounded-[36px] shadow-[0_20px_60px_rgba(192,132,252,0.15)] w-full max-w-sm text-center relative z-10">
                        <div className="text-6xl mb-4 animate-bounce drop-shadow-md">🎀</div>
                        <h1 className="text-2xl font-black text-purple-700 mb-2">Welcome to Club!</h1>
                        <p className="text-xs text-slate-500 mb-8 font-medium">กรอกชื่อเพื่อเข้าสู่คลับลดน้ำหนักส่วนตัว<br/>ระบบเชื่อมต่อ Cloud ให้เรียบร้อยแล้วค่ะ ✨</p>
                        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 pl-4 flex items-center text-purple-300 text-lg">🌸</span>
                                <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="ใส่ชื่อของคุณ (เช่น: Pattama)" className="w-full bg-white/80 border-2 border-purple-100 rounded-[20px] pl-12 pr-4 py-4 text-sm font-bold text-purple-900 focus:outline-none focus:border-purple-400 focus:bg-white transition-colors placeholder:text-purple-300/80 shadow-inner" />
                            </div>
                            <button type="submit" className="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-black text-sm py-4 rounded-[20px] shadow-lg shadow-purple-300/50 active:scale-95 transition-all">เริ่มภารกิจคนสวย! 🚀</button>
                        </form>
                    </div>
                </div>
            );
        }

        const Dashboard = ({ user, profileName, onLogout }) => {
            const normalizedProfileName = profileName.trim().toLowerCase();
            const displayProfileName = profileName.trim().charAt(0).toUpperCase() + profileName.trim().slice(1).toLowerCase();
            const localCacheKey = `p45_data_${normalizedProfileName}`;
            
            const cachedDataStr = window.localStorage.getItem(localCacheKey);
            const cachedData = cachedDataStr ? JSON.parse(cachedDataStr) : null;

            const [loadingData, setLoadingData] = useState(!cachedData);
            const [activeTab, setActiveTab] = useState('tracker'); 
            const [showConfetti, setShowConfetti] = useState(false);
            
            const dateString = new Date().toDateString(); 
            
            const [weight, setWeight] = useState(cachedData?.weight || 52.0);
            const [allRecords, setAllRecords] = useState(cachedData?.records || {}); 
            // 💡 วันที่เริ่มนับ 1 แบบ Dynamic
            const [startDateStr, setStartDateStr] = useState(cachedData?.startDate || new Date().toDateString());
            
            const defaultDailyData = {
                water: 0, protein: 0, breakfastDone: false,
                lunchDone: false, snackDone: false, dinnerDone: false,
                exerciseChecks: [false, false, false, false],
                fastingSuccess: false, kneePain: null
            };

            const [dailyData, setDailyData] = useState(() => {
                if (cachedData?.records && cachedData.records[dateString]) return cachedData.records[dateString];
                return defaultDailyData;
            });
            
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', normalizedProfileName);

            useEffect(() => {
                if (!user) return;
                const timeoutId = setTimeout(() => setLoadingData(false), 2000);

                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    clearTimeout(timeoutId); 
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        window.localStorage.setItem(localCacheKey, JSON.stringify(data));
                        if (data.weight) setWeight(data.weight);
                        if (data.records) setAllRecords(data.records); 
                        if (data.startDate) setStartDateStr(data.startDate);
                        
                        if (data.records && data.records[dateString]) {
                            setDailyData(data.records[dateString]);
                        } else {
                            setDailyData(defaultDailyData);
                        }
                    } else {
                        // เซฟวันแรกที่เข้ามาเป็น Day 1 ทันที
                        const todayDateStr = new Date().toDateString();
                        const dataToSave = cachedData || { weight: 52.0, records: {}, startDate: todayDateStr };
                        if (!dataToSave.startDate) dataToSave.startDate = todayDateStr; 
                        
                        setDoc(docRef, dataToSave, { merge: true });
                        setStartDateStr(todayDateStr);
                    }
                    setLoadingData(false);
                }, (error) => {
                    console.error("Cloud Error", error);
                    setLoadingData(false);
                });

                return () => { clearTimeout(timeoutId); unsubscribe(); };
            }, [user.uid, normalizedProfileName, dateString]);

            const updateDaily = (key, value) => {
                const newData = { ...dailyData, [key]: value };
                setDailyData(newData); 
                const newRecords = { ...allRecords, [dateString]: newData };
                setAllRecords(newRecords);
                window.localStorage.setItem(localCacheKey, JSON.stringify({ weight, records: newRecords, startDate: startDateStr }));
                setDoc(docRef, { records: { [dateString]: newData } }, { merge: true });
            };

            const updateWeightToCloud = (newWeight) => {
                setWeight(newWeight);
                window.localStorage.setItem(localCacheKey, JSON.stringify({ weight: newWeight, records: allRecords, startDate: startDateStr }));
                setDoc(docRef, { weight: newWeight }, { merge: true });
            };

            const targetWeight = 45.0;
            const initialWeight = 52.0;
            const targetWater = 8;
            const targetProtein = 4;
            
            const todayObj = new Date();
            const todayOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const todayStr = todayObj.toLocaleDateString('th-TH', todayOptions);
            
            // 📅 ระบบคำนวณวันเดินทาง (เริ่มนับ 1 จากวันที่โหลดครั้งแรก)
            const planStartDate = new Date(startDateStr);
            planStartDate.setHours(0,0,0,0);
            const todayMidnight = new Date();
            todayMidnight.setHours(0,0,0,0);
            const diffTime = todayMidnight.getTime() - planStartDate.getTime();
            const diffDays = Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24))) + 1; // นับ Day 1 เสมอ
            const totalDays = 60; 
            const overallProgress = Math.min(Math.round((diffDays / totalDays) * 100), 100);

            // 👑 ฟังก์ชันสร้างตารางบริหารเปลี่ยนรายวัน 
            const getDailyPlan = (dayIndex) => {
                // 🍎 เมนูอาหารที่ชอบแบบ Custom สุดๆ
                const baseMeals = {
                    breakfast: 'กล้วยหอม 1 ลูก หรือ ขนมปังโฮลวีต + นมโปรตีนสูง',
                    lunch: 'พะแนงเนื้อ 7-11 (ตักน้ำแกงน้อยๆ) หรือ สุกี้น้ำ/ชาบู (เน้นผัก ไม่ซดน้ำ)',
                    snack: 'ทุเรียน 1 พูเล็กๆ / ลิ้นจี่ / ลำไย (กินพอหายอยาก แช่เย็นฟินๆ)',
                    dinner: 'อาหารญี่ปุ่น เช่น ซูชิ/ซาชิมิ (ย้ำ! ❌ ห้ามมีสาหร่ายเด็ดขาด)'
                };

                const schedules = {
                    0: { type: 'Rest & Recover (วันพักผ่อน)', target: 'ยืดเหยียด & พักกล้ามเนื้อ', meals: baseMeals, exercises: [ { title: 'Arm Cross-Body Stretch', focus: 'หัวไหล่และต้นแขน', detail: 'ยืดแขนข้ามลำตัว ค้างไว้ข้างละ 30 วินาที' }, { title: 'Overhead Tricep Stretch', focus: 'ท้องแขน', detail: 'พับแขนไปด้านหลัง ค้างไว้ข้างละ 30 วินาที' }, { title: 'แกว่งแขนลดพุง', focus: 'ระบบเลือดและแขน', detail: 'ยืนแกว่งแขนสบายๆ 100 ครั้ง' }, { title: 'เดินเล่นชิลๆ', focus: 'ผ่อนคลาย', detail: 'เดินรับลมรอบหมู่บ้าน 15 นาที' } ] },
                    1: { type: 'Arm & Core Focus', target: 'ลดต้นแขน & หน้าท้อง', meals: baseMeals, exercises: [ { title: 'Arm Punches (ชกมวยอากาศ)', focus: 'ต้นแขนกระชับ', detail: 'ชกสลับซ้าย-ขวาเกร็งหน้าท้อง 40 วินาที' }, { title: 'Arm Circles (หมุนแขน)', focus: 'หัวไหล่และแขน', detail: 'กางแขนตึงหมุนเป็นวงกลมเล็กๆ 40 วินาที' }, { title: 'Wall Push-ups (วิดพื้นดันกำแพง)', focus: 'หน้าอกและหลังแขน', detail: 'ดันกำแพงเบาๆ ไม่กระแทกเข่า 40 วินาที' }, { title: 'Standing Side Crunches', focus: 'เอวด้านข้าง', detail: 'ยืนเอียงตัวแตะเข่าด้านข้าง 40 วินาที' } ] },
                    2: { type: 'Lower Body (Knee-Friendly)', target: 'ปั้นก้นเด้ง & ลดสะโพก', meals: baseMeals, exercises: [ { title: 'Glute Bridge (สะพานโค้ง)', focus: 'ก้นและหลังล่าง', detail: 'นอนชันเข่ายกสะโพกขึ้นเกร็งก้น 40 วินาที' }, { title: 'Clamshells (นอนเปิดเข่า)', focus: 'สะโพกด้านข้าง', detail: 'นอนตะแคงเปิด-ปิดเข่าช้าๆ ข้างละ 30 วินาที' }, { title: 'Donkey Kicks', focus: 'กล้ามเนื้อก้น', detail: 'คุกเข่าเตะขาขึ้นฟ้า ข้างละ 30 วินาที' }, { title: 'Fire Hydrants', focus: 'สะโพกด้านนอก', detail: 'คุกเข่ายกขาออกด้านข้าง ข้างละ 30 วินาที' } ] },
                    3: { type: 'Intense Arm Toning 🔥', target: 'กระชับต้นแขนแบบเน้นๆ', meals: baseMeals, exercises: [ { title: 'Tricep Dips on Chair', focus: 'ท้องแขน (หลังแขน)', detail: 'ใช้เก้าอี้/โซฟาดันตัวขึ้นลงช้าๆ 40 วินาที' }, { title: 'Arm Pulses (ขยับแขนสั้นๆ)', focus: 'ต้นแขนโดยรวม', detail: 'กางแขนตึง ขยับขึ้นลงสั้นๆ รัวๆ 40 วินาที' }, { title: 'Overhead Reaches', focus: 'ไหล่และต้นแขน', detail: 'ชูแขนขึ้นสุดลงสุดไวๆ 40 วินาที' }, { title: 'Plank Taps', focus: 'แขนและแกนกลาง', detail: 'คุกเข่าแพลงก์ เอามือแตะไหล่สลับ 40 วินาที' } ] },
                    4: { type: 'Light Cardio & Core', target: 'เบิร์นไขมัน & เอวเอส', meals: baseMeals, exercises: [ { title: 'High Knee Marches', focus: 'คาร์ดิโอเบาๆ', detail: 'ย่ำเท้าอยู่กับที่ ยกเข่าสูง 40 วินาที' }, { title: 'Standing Bicycle Crunches', focus: 'หน้าท้อง', detail: 'ยืนบิดเอวศอกแตะเข่าสลับข้าง 40 วินาที' }, { title: 'Modified Jumping Jacks', focus: 'เบิร์นทั่วตัว', detail: 'กางแขน-ขาแบบก้าวเดิน (ไม่กระโดด) 40 วินาที' }, { title: 'Bird-Dog', focus: 'หลังและแกนกลาง', detail: 'คุกเข่ายืดแขนสลับขา ค้างไว้ 40 วินาที' } ] },

                                        </div>

                                <section className="bg-white rounded-[28px] p-6 shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-purple-50 relative overflow-hidden mt-2 transition-all duration-500">

                                        <div className="flex items-center justify-between mb-4 cursor-pointer" onClick={() => setWaterOpen(!waterOpen)}>

                                            <div className="flex items-center gap-2">
                                                <div className="bg-white/80 backdrop-blur text-blue-500 px-3 py-1 rounded-full text-[11px] font-bold shadow-sm">{dailyData.water} / {targetWater} แก้ว</div>
                                            </div>
                                        </div>
                                        {waterOpen && (
                                        <div className="animation-fade-in">
                                            <div className="flex items-center justify-center gap-6 mb-6">
                                                <button onClick={() => updateDaily('water', Math.max(0, dailyData.water - 1))} className="w-12 h-12 rounded-full bg-white border border-slate-200 text-xl font-medium text-slate-400 active:scale-95 shadow-sm">-</button>
                                                <div className="text-5xl transition-all duration-500" style={{ filter: dailyData.water >= targetWater ? 'drop-shadow(0px 4px 10px rgba(96, 165, 250, 0.4))' : 'grayscale(1)' }}>💧</div>
                                                <button onClick={() => updateDaily('water', dailyData.water + 1)} className="w-12 h-12 rounded-full bg-gradient-to-br from-blue-400 to-cyan-400 text-white text-xl font-bold active:scale-95 shadow-md shadow-blue-200">+</button>
                                            </div>
                                            <div className="mt-4 pt-4 border-t border-slate-100">
                                                <h3 className="text-[11px] font-bold text-slate-500 mb-3 text-center">ตารางดื่มน้ำให้ครบ 2 ลิตร/วัน (แก้วละ ~250 ml)</h3>
                                                <div className="space-y-2">
                                                    {waterSchedule.map((item, idx) => (
                                                        <div key={idx} className="flex items-center justify-between bg-white/60 p-3 rounded-[16px] border border-blue-50">
                                                            <div className="flex flex-col gap-1">
                                                                <span className="text-[10px] font-black text-blue-500 w-max bg-blue-50 px-2 py-0.5 rounded-md">{item.time}</span>
                                                                <span className="text-[10px] font-medium text-slate-500 pl-1">{item.desc}</span>
                                                            </div>
                                                            <div className="text-[11px] font-bold text-blue-600 bg-white px-3 py-1.5 rounded-xl shadow-sm border border-blue-50 whitespace-nowrap">
                                                                {item.amount} แก้ว
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        )}
                                    </div>
                                </section>

                                <section className="bg-white rounded-[28px] p-6 shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-purple-50 mt-2 transition-all duration-500">
                                    <div className="flex items-center justify-between cursor-pointer" onClick={() => setExOpen(!exOpen)}>
                                        <div>
                                            <h2 className="font-black text-slate-700 flex items-center gap-2 text-sm"><span className="text-xl">💃</span> ขยับร่างกาย (40 Pts)</h2>
                                            <p className="text-[10px] text-purple-500 font-bold mt-1 ml-8">เป้าหมายวันนี้: {dailyPlan.target}</p>
                                        </div>
                                        <div className="bg-slate-50 px-3 py-1 rounded-full text-[10px] font-bold text-slate-400">{exOpen ? 'ซ่อน' : 'เปิด'}</div>
                                    </div>
                                    {exOpen && (
                                    <div className="grid gap-3 mt-5 animation-fade-in">
                                        {dailyPlan.exercises.map((ex, idx) => {
                                            const isDone = dailyData.exerciseChecks[idx] || false;
                                            return (
                                            <div key={idx} onClick={() => {
                                                const newChecks = [...dailyData.exerciseChecks];
                                                newChecks[idx] = !isDone;
                                                updateDaily('exerciseChecks', newChecks);
                                            }} className={`p-4 rounded-[20px] cursor-pointer flex items-center justify-between transition-all duration-300 active:scale-95 ${isDone ? 'bg-slate-50/50 border border-slate-100 opacity-60' : 'bg-white shadow-sm border border-purple-100 hover:border-purple-300'}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-10 h-10 shrink-0 rounded-2xl flex items-center justify-center transition-colors ${isDone ? 'bg-slate-100 text-slate-400' : 'bg-purple-100 text-purple-500'}`}><span className="font-black text-sm">{idx + 1}</span></div>
                                                    <div className="pr-2">
                                                        <h3 className={`font-extrabold text-sm transition-all leading-tight ${isDone ? 'text-slate-400 line-through' : 'text-slate-700'}`}>{ex.title}</h3>
                                                        <p className={`text-[10px] mt-1.5 font-medium leading-snug ${isDone ? 'text-slate-400' : 'text-slate-500'}`}>
                                                            <span className={`px-1.5 py-0.5 rounded-md mr-1.5 ${isDone ? 'bg-slate-100 text-slate-400' : 'bg-purple-50 text-purple-500'}`}>🎯 {ex.focus}</span>
                                                            {ex.detail}
                                                        </p>
                                                    </div>
                                                </div>
                                                <div className={`w-7 h-7 shrink-0 rounded-full border-2 flex items-center justify-center transition-colors ${isDone ? 'border-purple-400 bg-purple-400' : 'border-slate-200 bg-slate-50'}`}>
                                                    {isDone && <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>}
                                                </div>
                                            </div>
                                        )})}
                                    </div>
                                    )}
                                </section>

                                <section className="grid grid-cols-2 gap-4 my-4 pb-4">
                                    <div onClick={() => updateDaily('fastingSuccess', !dailyData.fastingSuccess)} className={`p-5 rounded-[28px] border-2 cursor-pointer transition-all duration-300 flex flex-col justify-between active:scale-95 ${dailyData.fastingSuccess ? 'border-indigo-400 bg-indigo-50 shadow-md shadow-indigo-100/50' : 'border-transparent bg-white shadow-sm border-slate-100 hover:border-indigo-200'}`}>
                                        <div className="flex items-center justify-between mb-3">
                                            <div className={`w-12 h-12 rounded-[18px] flex items-center justify-center text-2xl transition-transform ${dailyData.fastingSuccess ? 'bg-indigo-500 text-white shadow-md scale-105' : 'bg-slate-50'}`}>🌌</div>
                                            <div className={`relative w-6 h-6 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors ${dailyData.fastingSuccess ? 'border-indigo-500 bg-indigo-500' : 'border-slate-200'}`}>
                                                {dailyData.fastingSuccess && <svg className="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>}
                                            </div>
                                        </div>
                                        <div>
                                            <h3 className={`font-extrabold text-sm ${dailyData.fastingSuccess ? 'text-indigo-700' : 'text-slate-700'}`}>งดมื้อดึก (IF)</h3>
                                            <p className="text-[9px] text-slate-400 font-bold mt-1 uppercase tracking-wider">โบนัสวินัย • หลัง 19:00 น.</p>
                                        </div>
                                    </div>

                                    <div className="p-5 rounded-[28px] border border-slate-100 bg-white shadow-sm flex flex-col justify-between">
                                        <h2 className="font-black text-xs text-slate-500 mb-3 flex items-center gap-1.5"><span className="text-lg">🦵</span> เช็คหัวเข่า</h2>
                                        <div className="flex justify-between gap-2 mt-auto">
                                            <button onClick={() => updateDaily('kneePain', 'none')} className={`flex-1 py-3 rounded-[16px] flex flex-col items-center gap-1.5 transition-all duration-300 ${dailyData.kneePain === 'none' ? 'bg-emerald-100 text-emerald-600 border border-emerald-200' : 'bg-slate-50 text-slate-400 border border-transparent hover:bg-slate-100'}`}>
                                                <span className="text-xl leading-none">🥰</span><span className="text-[10px] font-bold">ปกติ</span>
                                            </button>
                                            <button onClick={() => updateDaily('kneePain', 'mild')} className={`flex-1 py-3 rounded-[16px] flex flex-col items-center gap-1.5 transition-all duration-300 ${dailyData.kneePain === 'mild' ? 'bg-orange-100 text-orange-600 border border-orange-200' : 'bg-slate-50 text-slate-400 border border-transparent hover:bg-slate-100'}`}>
                                                <span className="text-xl leading-none">🥺</span><span className="text-[10px] font-bold">ตึงนิดๆ</span>
                                            </button>
                                        </div>
                                    </div>
                                </section>
                            </>
                        ) : activeTab === 'plan' ? (
                            <div className="space-y-6 pb-10 animation-fade-in">
                                <section className="bg-white rounded-[32px] p-6 shadow-sm border border-purple-50 relative overflow-hidden">
                                    <div className="absolute top-[-10%] right-[-10%] w-32 h-32 bg-purple-100 rounded-full blur-2xl opacity-60"></div>
                                    <div className="flex justify-between items-center mb-6 relative z-10">
                                        <h2 className="font-black text-lg text-purple-900 flex items-center gap-2">🍱 แผนเสบียงวันนี้</h2>
                                        <div className="bg-pink-50 text-pink-500 text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider border border-pink-100">Convenience Mode</div>
                                    </div>
                                    <div className="space-y-6 relative ml-4 z-10">
                                        <div className="absolute left-[13px] top-4 bottom-4 w-0.5 bg-purple-100 -z-10 rounded-full"></div>
                                        {[ { time: '10:00', meal: 'มื้อเช้า', desc: dailyPlan.meals.breakfast, icon: '🥞', color: 'fuchsia' }, { time: '13:00', meal: 'มื้อเที่ยง', desc: dailyPlan.meals.lunch, icon: '🍱', color: 'purple' }, { time: '16:00', meal: 'มื้อว่าง', desc: dailyPlan.meals.snack, icon: '🧁', color: 'pink' }, { time: '18:30', meal: 'มื้อเย็น', desc: dailyPlan.meals.dinner, icon: '🍲', color: 'violet' } ].map((item, idx) => (
                                            <div key={idx} className="flex gap-5 items-start relative">
                                                <div className={`w-7 h-7 rounded-full border-[3px] border-white bg-${item.color}-200 flex items-center justify-center shrink-0 shadow-sm mt-1 -ml-[3px] text-sm`}>{item.icon}</div>
                                                <div className="bg-slate-50 p-4 rounded-[20px] flex-1 border border-slate-100 shadow-sm">
                                                    <div className="flex items-center gap-2 mb-2"><span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded-md bg-${item.color}-100 text-${item.color}-600`}>{item.time}</span><h3 className="font-extrabold text-slate-700 text-sm">{item.meal}</h3></div>
                                                    <p className="text-[11px] font-medium text-slate-600 leading-relaxed">{item.desc}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-8 pt-6 border-t border-slate-100 relative z-10">
                                        <h3 className="font-black text-purple-500 text-[11px] uppercase tracking-wide mb-3 flex items-center gap-1.5"><span className="bg-purple-100 p-1.5 rounded-lg text-sm">🏪</span> ไอเดียเมนูร้านสะดวกซื้อ</h3>
                                        <div className="grid grid-cols-1 gap-2.5">
                                            {convenienceStoreIdeas.map((idea, idx) => (
                                                <div key={idx} className={`flex items-center gap-3 text-[11px] bg-white p-3 rounded-[16px] border shadow-sm ${idea.type === 'เตือน!' ? 'text-red-500 border-red-100 bg-red-50/30' : 'text-slate-500 border-slate-100'}`}>
                                                    <span className={`font-bold px-2 py-1 rounded-lg shrink-0 text-[9px] uppercase tracking-wider ${idea.type === 'เตือน!' ? 'bg-red-100 text-red-600' : 'bg-purple-50 text-purple-600'}`}>{idea.type}</span><span className="font-medium leading-snug">{idea.item}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </section>
                                <section className="bg-gradient-to-br from-purple-800 to-fuchsia-900 rounded-[32px] p-7 shadow-lg border border-purple-700/50 mb-10 text-white relative overflow-hidden">
                                    <div className="absolute top-[-20%] right-[-10%] w-48 h-48 bg-white opacity-10 rounded-full blur-[30px]"></div>
                                    <div className="absolute bottom-[-10%] left-[-10%] w-32 h-32 bg-pink-400 opacity-20 rounded-full blur-[30px]"></div>
                                    <div className="relative z-10">
                                        <div className="mb-6"><h2 className="font-black text-xl text-white flex items-center gap-2 drop-shadow-md">💃 ขยับร่างกายวันนี้</h2><div className="inline-block bg-white/20 backdrop-blur-sm px-3 py-1 rounded-full mt-2"><p className="text-[10px] font-bold text-pink-100 uppercase tracking-widest">{dailyPlan.type}</p></div></div>
                                        <div className="space-y-3">
                                            {dailyPlan.exercises.map((ex, idx) => {
                                                const isDone = dailyData.exerciseChecks[idx];
                                                return (
                                                <div key={idx} className={`flex items-center gap-4 p-4 rounded-[20px] transition-all border ${isDone ? 'bg-white/20 border-white/30 shadow-inner' : 'bg-black/20 border-white/10 shadow-sm'}`}>
                                                    <div className={`w-10 h-10 rounded-2xl flex items-center justify-center text-sm font-black shadow-sm transition-colors ${isDone ? 'bg-white text-purple-600' : 'bg-white/10 text-white/50'}`}>{isDone ? '✓' : idx + 1}</div>
                                                    <div><span className={`text-sm font-bold transition-all block leading-tight ${isDone ? 'text-pink-200 line-through decoration-pink-300/50' : 'text-white'}`}>{ex.title}</span><span className={`text-[10px] mt-1.5 block ${isDone ? 'text-white/60' : 'text-purple-200'}`}>🎯 {ex.focus} — {ex.detail}</span></div>
                                                </div>
                                            )})}
                                        </div>
                                        <div className="mt-6 p-4 bg-black/20 rounded-[20px] text-[11px] font-medium text-pink-100 flex items-start gap-3 border border-white/10 leading-relaxed backdrop-blur-sm"><span className="text-xl">🥺</span><p>ทำท่าละ 40 วินาที พัก 20 วินาที ทำวนให้ครบ 4 รอบ <strong className="text-white block mt-1">ระวัง! หากเจ็บแปล๊บที่เข่าให้หยุดทำทันทีนะคะ</strong></p></div>
                                    </div>
                                </section>
                            </div>
                        ) : activeTab === 'stats' ? (
                            <div className="space-y-6 pb-10 animation-fade-in">
                                <section className="bg-white rounded-[32px] p-6 shadow-sm border border-purple-50">
                                    <h2 className="font-black text-lg text-purple-900 mb-1 flex items-center gap-2">📊 สถิติความปัง 7 วันย้อนหลัง</h2>
                                    <p className="text-[11px] text-slate-400 mb-6 font-medium">ดูกราฟคะแนนความมีวินัยของตัวเองกันค่ะ</p>
                                    <div className="flex items-end justify-between h-48 gap-2.5 pt-4 border-t border-slate-100">
                                        {last7Days.map((dateStr, i) => {
                                            const rec = allRecords[dateStr];
                                            const score = computeScoreForRecord(rec);
                                            const dayObj = new Date(dateStr);
                                            const dayName = dayObj.toLocaleDateString('th-TH', {weekday: 'short'});
                                            const isToday = dateStr === dateString;
                                            const finalScore = isToday ? dailyScore : score;
                                            return (
                                                <div key={dateStr} className="flex flex-col items-center flex-1 gap-2 h-full">
                                                    <span className={`text-[10px] font-black ${finalScore === 100 ? 'text-pink-500' : 'text-purple-400'}`}>{finalScore}%</span>
                                                    <div className="w-full bg-slate-50 rounded-t-xl relative flex items-end justify-center h-full border border-slate-100 overflow-hidden">
                                                        <div className={`w-full rounded-t-xl transition-all duration-1000 ${finalScore === 100 ? 'bg-gradient-to-t from-pink-400 to-purple-400' : 'bg-gradient-to-t from-purple-100 to-purple-50'}`} style={{height: `${finalScore}%`}}></div>
                                                    </div>
                                                    <span className={`text-[9px] ${isToday ? 'font-black text-purple-700 bg-purple-50 px-2 py-0.5 rounded-md' : 'font-bold text-slate-400'}`}>{isToday ? 'วันนี้' : dayName}</span>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </section>
                                <section className="bg-white rounded-[32px] p-6 shadow-sm border border-purple-50">
                                    <h2 className="font-black text-[11px] text-slate-400 uppercase tracking-widest mb-4">🏆 สรุปภาพรวมหุ่นสวย</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-slate-50 p-5 rounded-[24px] border border-slate-100 text-center shadow-sm">
                                            <p className="text-[10px] text-slate-400 font-bold mb-1">น้ำหนักปัจจุบัน</p>
                                            <p className="text-3xl font-black text-slate-700">{weight.toFixed(1)} <span className="text-xs font-bold text-slate-400">กก.</span></p>
                                        </div>
                                        <div className="bg-gradient-to-br from-purple-50 to-pink-50 p-5 rounded-[24px] border border-purple-100 text-center shadow-sm">
                                            <p className="text-[10px] text-purple-500 font-bold mb-1">เป้าหมายลดอีก</p>
                                            <p className="text-3xl font-black text-pink-500">{Math.max(0, weight - targetWeight).toFixed(1)} <span className="text-xs font-bold text-purple-300">กก.</span></p>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        ) : null}
                    </main>
                </div>
            );
        };

        const MainContainer = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(() => window.localStorage.getItem('p45_current_profile'));

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        // ปรับปรุงโค้ดล็อกอินให้ฉลาดขึ้น รองรับทั้งบน GitHub และหน้าจอพรีวิว
                        if (typeof __firebase_config !== 'undefined' && __firebase_config && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth); // ใช้โหมดไร้ตัวตนสำหรับเว็บจริงของลูกพี่
                        }
                    } catch (error) { 
                        console.error("Auth error", error); 
                        // ก๊อกสอง ถ้า Token พัง ให้สลับมาล็อกอินแบบไม่ระบุตัวตนทันที
                        try { await signInAnonymously(auth); } catch(e) {}
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setAuthLoading(false); });
                return () => unsubscribe();
            }, []);

            const handleLogin = (name) => { 
                const safeName = name.trim().toLowerCase(); 
                setCurrentUser(safeName); window.localStorage.setItem('p45_current_profile', safeName); 
            };
            const handleLogout = () => { setCurrentUser(null); window.localStorage.removeItem('p45_current_profile'); };

            if (authLoading) return <div className="min-h-screen bg-[#faf5ff] flex flex-col items-center justify-center text-purple-400"><div className="w-12 h-12 border-4 border-purple-200 border-t-purple-500 rounded-full animate-spin mb-4"></div><p className="font-bold text-sm">กำลังโหลดตู้เซฟคนสวย... 🌸</p></div>;
            if (!user || !currentUser) return <LoginScreen onLogin={handleLogin} />;

            return <Dashboard user={user} profileName={currentUser} onLogout={handleLogout} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainContainer />);
    </script>
</body>
</html>
